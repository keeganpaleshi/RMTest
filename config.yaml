allow_fallback: true

analysis_isotope: radon

# Allow negative baseline-corrected rates. When enabled the reported values are
# preserved exactly; otherwise negatives are clamped to 0.0 Bq.
allow_negative_baseline: false

pipeline:
  log_level: INFO
  random_seed: 67
analysis:
  analysis_start_time: null
  analysis_end_time: null
  spike_end_time: null
  spike_periods: []
  run_periods: []
  radon_interval: null
  ambient_concentration: null
  background_model: loglin_unit
columns:
  timestamp: timestamps
  adc: adc_channels
baseline:
  range:
  - '2024-09-28T00:00:00Z'
  - '2024-10-28T23:59:59Z'
  monitor_volume_l: 605.0
  sample_volume_l: 4196.0
  isotopes_to_subtract:
  - noise
burst_filter:
  burst_mode: rate
  burst_window_size_s: 60
  rolling_median_window: 5
  burst_multiplier: 5
  micro_window_size_s: 1
  micro_count_threshold: 3
calibration:
  method: two-point
  noise_cutoff: 400
  hist_bins: 2000
  peak_search_radius: 100
  peak_prominence: 5
  peak_width: 5
  peak_widths:
    Po210: 5
    Po218: 5
    Po214: 5
    Po216: 5
    Po212: 5
  slope_mev_per_ch: 0.00427
  float_slope: true
  use_two_point: true
  use_quadratic: false
  nominal_adc:
    Po210: 1246
    Po218: 1399
    Po216: 1587
    Po214: 1802
    Po212: 2057
  fit_window_adc: 40
  fit_retry_window: 60
  fit_maxfev: 15000
  curve_fit_max_evaluations: 10000
  use_emg: true
  init_sigma_adc: 10.0
  sigma_e_init: null
  init_tau_adc: 1.0
  sanity_tolerance_mev: 1.0
  known_energies:
    Po210: 5.304
    Po218: 6.002
    Po216: 6.778
    Po214: 7.687
    Po212: 8.784
  # Fitting bounds and thresholds (previously hardcoded)
  min_peak_separation_adc: 10.0
  gaussian_sigma_upper_bound: 500.0
  emg_sigma_upper_bound: 250.0
  emg_tau_upper_bound: 200.0
  quadratic_residual_threshold_mev: 0.005
  jacobian_epsilon: 1.0e-6
  tau_bounds_adc:
    default: [5.0e-4, 50.0]
    Po218: [5.0e-4, 8.0]
spectral_fit:
  do_spectral_fit: true
  spectral_binning_mode: adc
  adc_bin_width: 10
  # ADC Differential Non-Linearity correction
  dnl_correction:
    enabled: true
    iterations: 1
    min_counts: 5
    max_correction: 0.5
    smooth_window: 61
  energy_bin_width: 0.0130
  fd_hist_bins: 400
  mu_sigma: 0.005
  fit_energy_range:
  - 1.7
  - 9.5
  amp_prior_scale: 5.0
  bkg_mode: "manual"
  clip_floor: 1e-300
  b0_prior:
    - 0.0
    - 4.0
  b1_prior:
    - 0.0
    - 4.0
  b2_prior:
    - 0.0
    - 0.5
  b3_prior:
    - 0.0
    - 0.5
  # NOTE: in loglin_unit background model, b0 cancels in the shape
  # normalization (exp(b0) appears in both numerator and denominator).
  # Fix it at 0 to remove the degeneracy with S_bkg.
  s_bkg_prior:
    - 0.0
    - 5.0
  # Fitting numerical constants (previously hardcoded)
  tau_bound_expansion: 10.0
  background_norm_points: 512
  emg_tau_floor: 5.0e-4
  tau_po210_prior_mean: 0.10
  tau_po210_prior_sigma: 0.10
  # tau_Po218: PIN photodiode dead layer produces similar EMG tails
  # for all isotopes. Moderate value toward physics-consistent shape.
  tau_po218_prior_mean: 0.05
  tau_po218_prior_sigma: 0.08
  # tau_Po214: fixed at data-preferred value to break correlation chain
  # with sigma_Po214 (r=-0.56), f_shelf_Po214 (r=-0.52), S_Po214.
  # Split-half z=-1.99 was the largest shape-param z-score.
  tau_po214_prior_mean: 0.087
  tau_po214_prior_sigma: 0.08
  # tau_Po216: EMG disabled for Po216 (thoron chain), but prior needed as fallback
  tau_po216_prior_mean: 0.001
  tau_po216_prior_sigma: 0.05
  # tau_Po212: EMG tail for Po212 (similar to Po214)
  tau_po212_prior_mean: 0.09
  tau_po212_prior_sigma: 0.05
  spectral_peak_tolerance_mev: 0.2
  sigma_e_prior_source: "calibration"
  sigma_e_prior_sigma: 0.015
  sigma_e_prior_mean: 0.055
  use_emg:
    Po210: true
    Po218: true
    Po214: true
  # Low-energy shelf (erfc step function) for degraded alphas.
  # shelf_range controls how far below the peak the shelf extends (MeV).
  # A Gaussian taper with this sigma prevents the shelf from reaching
  # unrealistically far below the peak.
  shelf_range: 1.5
  use_shelf:
    Po210: true
    Po218: true
    Po214: true
    Po216: false
    Po212: true
  f_shelf_Po210_prior:
    - 0.062
    - 0.10
  f_shelf_Po214_prior:
    - 0.06
    - 0.05
  f_shelf_Po218_prior:
    - 0.30
    - 0.05
  # Separate shelf transition widths (decoupled from peak sigma)
  sigma_shelf_Po210_prior:
    - 0.15
    - 0.08
  sigma_shelf_Po214_prior:
    - 0.15
    - 0.08
  sigma_shelf_Po218_prior:
    - 0.40
    - 0.08
  f_shelf_Po212_prior:
    - 0.35
    - 0.08
  sigma_shelf_Po212_prior:
    - 0.50
    - 0.10
  # Halo (broad peak component) for detector dead-layer scattering
  use_halo:
    Po210: true
    Po218: true
    Po214: true
    Po216: false
    Po212: true
  f_halo_Po210_prior:
    - 0.07
    - 0.15
  sigma_halo_Po210_prior:
    - 0.26
    - 0.15
  tau_halo_Po210_prior:
    - 0.07
    - 0.05
  f_halo_Po214_prior:
    - 0.11
    - 0.10
  sigma_halo_Po214_prior:
    - 0.26
    - 0.12
  tau_halo_Po214_prior:
    - 0.08
    - 0.04
  f_halo_Po218_prior:
    - 0.03
    - 0.10
  sigma_halo_Po218_prior:
    - 0.25
    - 0.15
  tau_halo_Po218_prior:
    - 0.02
    - 0.10
  f_halo_Po212_prior:
    - 0.08
    - 0.15
  sigma_halo_Po212_prior:
    - 0.20
    - 0.15
  tau_halo_Po212_prior:
    - 0.05
    - 0.05
  # b2/b3 removed: correlation analysis shows 822%/5479% relative error
  # (nearly unconstrained, strongly anti-correlated with each other)
  # Per-isotope energy resolution
  per_isotope_sigma:
    Po210:
      - 0.107
      - 0.03
    Po218:
      - 0.12
      - 0.03
    Po216:
      - 0.12
      - 0.03
    Po214:
      - 0.13
      - 0.03
    Po212:
      - 0.13
      - 0.05
  max_tau_ratio: 2.0
  float_sigma_e: false  # per-isotope sigmas float instead
  peak_search_prominence: 30
  peak_search_width_adc: 3
  peak_search_method: prominence
  peak_search_cwt_widths: null
  refit_aic_threshold: 2.0
  use_plot_bins_for_fit: true
  unbinned_likelihood: false
  split_half_validation: true
  flags:
    fix_sigma0: true   # redundant when per-isotope sigmas float
    sigma0_prior:
      - 0.13
      - 0.05
    fix_f: true       # fix the Fano factor
    f_prior:
      - 0.0
      - 0.01
    # Po210: fix all shape params except sigma_Po210 (split-half shows
    # f_shelf, sigma_shelf, sigma_halo, tau_halo all unstable between halves)
    fix_tau_Po210: true
    fix_f_halo_Po210: true
    fix_f_shelf_Po210: true
    fix_sigma_shelf_Po210: true
    fix_sigma_halo_Po210: true
    fix_tau_halo_Po210: true
    # tau_Po218: fixed at physics-interpolated value.
    fix_tau_Po218: true
    # Po214: fix all shape params except sigma_Po214 (split-half shows
    # sigma_halo unstable between halves; shelf/halo fractions already fixed)
    fix_tau_Po214: true
    fix_tau_halo_Po214: true
    fix_f_shelf_Po214: true
    fix_f_halo_Po214: true
    fix_sigma_shelf_Po214: true
    fix_sigma_halo_Po214: true
    # Po218: unfix shape params — PIN photodiode physics requires
    # similar dead-layer shapes across isotopes. Priors now set to
    # match Po210/Po214 data-driven values.
    fix_f_shelf_Po218: true
    fix_sigma_shelf_Po218: true
    fix_f_halo_Po218: true
    fix_sigma_halo_Po218: true
    fix_tau_halo_Po218: true
    # Fix thoron chain (Po216, Po212) shape params: low statistics,
    # sigma/mu cannot be well constrained. Fix at physical priors.
    fix_sigma_Po212: true
    fix_sigma_Po216: true
    fix_tau_Po212: true
    fix_f_shelf_Po212: true
    fix_f_halo_Po212: true
    fix_sigma_shelf_Po212: true
    fix_sigma_halo_Po212: true
    fix_tau_halo_Po212: true
    # Po216: fix ALL shape params (very low statistics, halo/shelf disabled)
    fix_tau_Po216: true
    fix_f_shelf_Po216: true
    fix_f_halo_Po216: true
    fix_sigma_shelf_Po216: true
    fix_sigma_halo_Po216: true
    fix_tau_halo_Po216: true
    # Fix b0: redundant in loglin_unit model (cancels in normalization)
    fix_b0: true
    # b2/b3: large relative errors (200-300%) but removing them degrades
    # chi2/ndf from 1.09 to 8.55. The background shape requires curvature
    # even though the individual coefficients are weakly constrained.
    # Gaussian penalty priors: soft constraints in the NLL for parameters
    # where the likelihood alone cannot distinguish the component from
    # background.  Physics requires all isotopes to have similar dead-layer
    # scattering (halo) and energy-loss (shelf) profiles.
    penalty_priors:
      S_Po212:
        - 3000
        - 5000
  mu_bounds:
    Po210:
      - 5.20
      - 5.35
    Po218:
      - 5.93
      - 6.07
    Po216:
      - 6.65
      - 6.90
    Po214:
      - 7.60
      - 7.71
    Po212:
      - 8.70
      - 8.90
time_fit:
  do_time_fit: true
  window_po214:
    - 7.55
    - 7.80
  window_po218:
    - 5.90
    - 6.10
  window_po210:
    - 5.25
    - 5.37
  window_po212:
    - 8.65
    - 9.05
  eff_po214: 0.99
  eff_po218: null
  eff_po210: null
  hl_po214: null
  hl_po218: null
  bkg_po214:
    - 0.0
    - 0.2
  bkg_po218:
    - 0.0
    - 0.0
  sig_n0_po214: 1.0
  sig_n0_po218: 1.0
  background_guess: 0.0
  n0_guess_fraction: 0.1
  flags:
    fix_background_b: false
    fix_n0_po218: false
systematics:
  enable: false
  sigma_e_frac: 0.1
  tail_fraction: 0.05
  energy_shift_kev: 0.001
  adc_drift_rate: 0.0
  adc_drift_mode: linear
  adc_drift_params: null
radon_inference:
  enabled: true
  source_isotopes:
  - Po214
  - Po218
  source_weights:
    Po214: 0.5
    Po218: 0.5
  detection_efficiency:
    Po214: 0.19
    Po218: 0.094
  transport_efficiency: 1.0
  retention_efficiency: 1.0
  chain_correction: none  # allowed: none, assume_equilibrium, forward_model
  external_rn:
    mode: file  # allowed: constant, file
    fallback_bq_per_m3: 120.0
    file_path: rad_4996_pico40l.xls
    time_columns:
      year: Year
      month: Month
      day: Day
      hour: Hour
      minute: Minute
      year_format: two_digit
    value_column: Radon Bq/m^3
    tz: America/Toronto
    interpolation: ffill
    max_gap_seconds: 21600
  output:
    write_per_interval: true
    write_cumulative: true
plotting:
  plot_spectrum_binsize_adc: 1
  plot_time_binning_mode: fixed
  plot_time_bin_width_s: 86400
  plot_time_normalise_rate: true
  time_bins_fallback: 1
  plot_save_formats:
  - png
  dump_time_series_json: true
  plot_time_style: lines
  plot_time_show_models: false
  plot_marker_size: 0.5
  overlay_isotopes: true
  save_individual_time_series: false


fitting:
  use_stable_emg: true
  emg_stable_mode: true
  emg_tau_min: 5.0e-4
  per_isotope:
    Po210:
      peak_sigma: 0.108
