# I14b: exp_unit + NO halos + shelf fix (left-only) + per-isotope shelf_range
# Changes from I14a:
#   - Shelf bug fixed: strictly zero above peak (shapes.py)
#   - Per-isotope shelf_range to prevent shelf overlap between peaks
#   - Unknown1 shelf/tail much smaller
#   - max_f_shelf 0.65 (shelves now left-only, need room)
