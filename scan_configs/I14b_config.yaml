  - 0.10
  sigma_halo_Po216_prior:
  - 0.3
  - 0.20
  tau_halo_Po216_prior:
  - 0.02
  - 0.05
  f_halo_Po212_prior:
  - 0.12
  - 0.20
  sigma_halo_Po212_prior:
  - 0.4
  - 0.25
  tau_halo_Po212_prior:
  - 0.05
  - 0.05
