    Po216: 1587
    Po214: 1802
    Po212: 2057
  fit_window_adc: 40
  fit_retry_window: 60
  fit_maxfev: 15000
  curve_fit_max_evaluations: 10000
  use_emg: true
  init_sigma_adc: 10.0
  sigma_e_init: null
  init_tau_adc: 1.0
  sanity_tolerance_mev: 1.0
  known_energies:
    Po210: 5.304
    Po218: 6.002
    Po216: 6.778
    Po214: 7.687
    Po212: 8.784
  min_peak_separation_adc: 10.0
  gaussian_sigma_upper_bound: 500.0
  emg_sigma_upper_bound: 250.0
