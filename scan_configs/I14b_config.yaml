      tau: [0.01, 0.01]               # <<< tiny tau
      use_shelf: true                  # <<< small shelf
      f_shelf: [0.02, 0.02]           # <<< tiny shelf fraction
      sigma_shelf: [0.10, 0.05]       # <<< narrow shelf
      fix:
