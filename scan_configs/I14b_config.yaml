  sigma_e_prior_mean: 0.055
  use_emg:
    Po210: true
    Po218: true
    Po214: true
    Po212: true                        # <<< added — share left-side work with shelf
  # Per-isotope shelf_range: controls how far (MeV) shelf extends below each peak
  # Prevents shelf from crossing into neighboring peaks
  # Gaps: Po210→Po218=0.70, Po218→Po216=0.78, Po216→Po214=0.91, Po214→Po212=1.09
  shelf_range:
    Po210: 1.5                # nothing below — can extend into background
    Po218: 0.55               # gap to Po210=0.70, taper ~30% at Po210
    Po214: 0.6                # gap to Po216=0.91
    Po212: 0.8                # gap to Po214=1.09
    Unknown1: 1.0             # modest range for small shelf
    default: 1.0
  use_shelf:
    Po210: true
    Po218: true
    Po214: true
    Po216: false
    Po212: true
  # Shelf priors — relaxed to let fitter find optimal values
  # Peak gaps: Po210(5.30)→Po218(6.00)=0.70, Po218→Po216(6.78)=0.78,
  #            Po216→Po214(7.69)=0.91, Po214→Po212(8.78)=1.09
  f_shelf_Po210_prior:
  - 0.10
  - 0.10
  f_shelf_Po214_prior:
  - 0.15
  - 0.12
  f_shelf_Po218_prior:
  - 0.15
  - 0.12
  sigma_shelf_Po210_prior:
  - 0.25
  - 0.12                   # relaxed (was 0.08) — let it find optimal width
  sigma_shelf_Po214_prior:
  - 0.25
  - 0.12                   # relaxed (was 0.08)
  sigma_shelf_Po218_prior:
  - 0.15
  - 0.10                   # relaxed (was 0.06) — gap to Po210=0.70
  f_shelf_Po212_prior:
  - 0.10
  - 0.08                   # tightened — EMG now shares left-side work
  sigma_shelf_Po212_prior:
  - 0.25
  - 0.10                   # modest width
