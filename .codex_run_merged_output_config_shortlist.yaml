allow_fallback: true

analysis_isotope: radon

# Allow negative baseline-corrected rates. When enabled the reported values are
# preserved exactly; otherwise negatives are clamped to 0.0 Bq.
allow_negative_baseline: false

pipeline:
  log_level: INFO
  random_seed: 67
analysis:
  analysis_start_time: null
  analysis_end_time: null
  spike_end_time: null
  spike_periods: []
  run_periods: []
  radon_interval: null
  ambient_concentration: null
  background_model: exp_unit
columns:
  timestamp: timestamp
  adc: adc
baseline:
  range:
  - '2024-09-28T00:00:00Z'
  - '2024-10-28T23:59:59Z'
  monitor_volume_l: 605.0
  sample_volume_l: 4196.0
  isotopes_to_subtract:
  - noise
burst_filter:
  burst_mode: rate
  burst_window_size_s: 60
  rolling_median_window: 5
  burst_multiplier: 5
  micro_window_size_s: 1
  micro_count_threshold: 3
calibration:
  method: two-point
  noise_cutoff: 400
  hist_bins: 2000
  peak_search_radius: 100
  peak_prominence: 5
  peak_width: 5
  peak_widths:
    Po210: 5
    Po218: 5
    Po214: 5
    Po216: 5
    Po212: 5
  slope_mev_per_ch: 0.00427
  float_slope: true
  use_two_point: true
  use_quadratic: false
  nominal_adc:
    Po210: 1246
    Po218: 1399
    Po216: 1587
    Po214: 1802
    Po212: 2057
  fit_window_adc: 40
  fit_retry_window: 60
  fit_maxfev: 15000
  curve_fit_max_evaluations: 10000
  use_emg: true
  init_sigma_adc: 10.0
  sigma_e_init: null
  init_tau_adc: 1.0
  sanity_tolerance_mev: 1.0
  known_energies:
    Po210: 5.304
    Po218: 6.002
    Po216: 6.778
    Po214: 7.687
    Po212: 8.784
  # Fitting bounds and thresholds (previously hardcoded)
  min_peak_separation_adc: 10.0
  gaussian_sigma_upper_bound: 500.0
  emg_sigma_upper_bound: 250.0
  emg_tau_upper_bound: 200.0
  quadratic_residual_threshold_mev: 0.005
  jacobian_epsilon: 1.0e-6
  tau_bounds_adc:
    default: [5.0e-4, 50.0]
    Po218: [5.0e-4, 8.0]
spectral_fit:
  do_spectral_fit: true
  spectral_binning_mode: adc
  adc_bin_width: 1
  # ADC Differential Non-Linearity correction
  dnl_correction:
    enabled: true
    parameterized: true
    full_resolution_estimate: true
    fourier_periods_codes: [4, 8, 16, 32, 64, 128, 256, 512]
    post_dnl_rebin: 1
    iterations: 1
    min_counts: 5
    max_correction: 0.5
    smooth_window: 61
    crossval: false
    external_map_path: null
  # Prelim→rebin parameter handoff (requires full_resolution_estimate: true)
  # fix_bkg_from_prelim: "fix" locks b0/b1/S_bkg at prelim values,
  #   "seed" shifts prior mean but keeps sigma, "off" disables.
  fix_bkg_from_prelim: "fix"
  seed_peaks_from_prelim: "seed"   # "fix", "seed", or "off" for mu/sigma/S params
  seed_shape_from_prelim: "seed"   # "fix", "seed", or "off" for tau/shelf/halo
  # Three-stage binning: (1) full-res DNL estimation, (2) moderate rebin
  # to fit shape params (tau, shelf, halo, sigma), (3) coarser rebin to
  # refit physics params (amplitudes, background) with shapes fixed from
  # stage 2.  Requires full_resolution_estimate: true.
  three_stage_binning:
    enabled: false
    stage2_rebin: 3       # moderate bins for shape fitting
    stage3_rebin: 15      # coarser bins for physics parameters
  # Shared shape parameters: when true, a single shared parameter
  # replaces per-isotope entries for all participating isotopes.
  tau_energy_model: constant  # was linear; tau_slope = -0.0003 ± 0.0003 (1.1σ, 1.1% variation)
  tau_energy_model_E_ref: 7.0
  tau_0_prior: [0.08, 0.08]
  tau_slope_prior: [0.01, 0.02]
  shared_shape_params:
    tau: true   # was false (linear model). tau_slope ≈ 0 → single shared constant tau
    f_shelf: true
    sigma_shelf: true
    f_halo: true
    sigma_halo: true
    tau_halo: true
  # Shared priors (used when the corresponding shared_shape_params flag is true)
  tau_shared_prior: [0.097, 0.05]  # from J127 fitted tau_0 = 0.097
  f_shelf_shared_prior: [0.05, 0.10]
  sigma_shelf_shared_prior: [0.12, 0.10]
  f_halo_shared_prior: [0.06, 0.08]
  sigma_halo_shared_prior: [0.42, 0.15]
  tau_halo_shared_prior: [0.0, 0.001]  # effectively zero — halo has no EMG tail
  shared_shape_passive: [Po216, Bi212]
  exclude_isotopes: []
  energy_bin_width: 0.0130
  fd_hist_bins: 400
  mu_sigma: 0.005
  extra_peaks:
    Unknown1:
      energy: 15.8
      sigma: [0.5, 0.1]
      amplitude: [500, 300]
      mu_sigma: 0.3
      mu_bounds: [13.0, 19.0]
      use_emg: true
      tau: [0.01, 0.01]
      use_shelf: true
      f_shelf: [0.02, 0.02]
      sigma_shelf: [0.1, 0.05]
      fix:
        sigma: true
    Bi212:
      energy: 6.051                  # Bi-212 alpha (35.93% branch to Tl-208)
      sigma: [0.12, 0.03]           # Similar detector response to Po-218
      mu_sigma: 0.005                # Very tight — well-known energy
      mu_bounds: [6.03, 6.07]        # ±20 keV around known value
      use_emg: true
      tau: [0.08, 0.05]             # Priors for Bi212 (overridden by shared passive)
      use_shelf: true
      f_shelf: [0.05, 0.05]
      sigma_shelf: [0.25, 0.15]
      use_halo: true                 # Receives shared halo from chain isotopes
      f_halo: [0.04, 0.10]
      sigma_halo: [0.24, 0.12]
      tau_halo: [0.05, 0.05]
      amplitude: [500, 500]          # Dummy — overridden by amplitude_linked
      amplitude_linked:
        reference: Po212
        ratio: 0.5609                # 0.3593 / 0.6407 (alpha / beta branch)
      fix:
        sigma: true
  fit_energy_range:
  - 1.0
  - 19.0
  adc_trim_bins: [3, 3]    # trim N bins from [low, high] edges of ADC histogram
  amp_prior_scale: 5.0
  bkg_mode: "manual"
  clip_floor: 1e-300
  b0_prior:
    - 0.0
    - 4.0
  b1_prior:
    - 1.0
    - 2.0
  b2_prior:
    - 0.0
    - 0.5
  b3_prior:
    - 0.0
    - 0.5
  # NOTE: in loglin_unit background model, b0 cancels in the shape
  # normalization (exp(b0) appears in both numerator and denominator).
  # Fix it at 0 to remove the degeneracy with S_bkg.
  s_bkg_prior:
    - 0.0
    - 5.0
  # Fitting numerical constants (previously hardcoded)
  tau_bound_expansion: 10.0
  background_norm_points: 512
  emg_tau_floor: 5.0e-4
  tau_po210_prior_mean: 0.10
  tau_po210_prior_sigma: 0.10
  # tau_Po218: PIN photodiode dead layer produces similar EMG tails
  # for all isotopes. Moderate value toward physics-consistent shape.
  tau_po218_prior_mean: 0.05
  tau_po218_prior_sigma: 0.08
  # tau_Po214: fixed at data-preferred value to break correlation chain
  # with sigma_Po214 (r=-0.56), f_shelf_Po214 (r=-0.52), S_Po214.
  # Split-half z=-1.99 was the largest shape-param z-score.
  tau_po214_prior_mean: 0.087
  tau_po214_prior_sigma: 0.08
  # tau_Po216: EMG disabled for Po216 (thoron chain), but prior needed as fallback
  tau_po216_prior_mean: 0.001
  tau_po216_prior_sigma: 0.05
  # tau_Po212: EMG tail for Po212 (similar to Po214)
  tau_po212_prior_mean: 0.09
  tau_po212_prior_sigma: 0.05
  # Skip MINOS profile likelihood errors (use Hesse diagonal instead).
  # Much faster (~3-5x) -- adequate for parameter scans.
  skip_minos: true
  spectral_peak_tolerance_mev: 0.2
  sigma_e_prior_source: "calibration"
  sigma_e_prior_sigma: 0.015
  sigma_e_prior_mean: 0.055
  use_emg:
    Po210: true
    Po218: true
    Po214: true
    Po216: true
    Po212: true
  # Low-energy shelf (erfc step function) for degraded alphas.
  # shelf_range controls how far below the peak the shelf extends (MeV).
  # A Gaussian taper with this sigma prevents the shelf from reaching
  # unrealistically far below the peak.
  shelf_range: 1.5
  use_shelf:
    Po210: true
    Po218: true
    Po214: true
    Po216: true
    Po212: true
  f_shelf_Po210_prior:
    - 0.062
    - 0.10
  f_shelf_Po214_prior:
    - 0.06
    - 0.05
  f_shelf_Po218_prior:
    - 0.30
    - 0.05
  # Separate shelf transition widths (decoupled from peak sigma)
  sigma_shelf_Po210_prior:
    - 0.15
    - 0.08
  sigma_shelf_Po214_prior:
    - 0.15
    - 0.08
  sigma_shelf_Po218_prior:
    - 0.40
    - 0.08
  f_shelf_Po212_prior:
    - 0.35
    - 0.08
  sigma_shelf_Po212_prior:
    - 0.50
    - 0.10
  # Halo (broad peak component) for detector dead-layer scattering
  use_halo:
    Po210: true
    Po218: true
    Po214: true
    Po216: true
    Po212: true
  f_halo_Po210_prior:
    - 0.07
    - 0.15
  sigma_halo_Po210_prior:
    - 0.26
    - 0.15
  tau_halo_Po210_prior:
    - 0.07
    - 0.05
  f_halo_Po214_prior:
    - 0.11
    - 0.10
  sigma_halo_Po214_prior:
    - 0.26
    - 0.12
  tau_halo_Po214_prior:
    - 0.08
    - 0.04
  f_halo_Po218_prior:
    - 0.03
    - 0.10
  sigma_halo_Po218_prior:
    - 0.25
    - 0.15
  tau_halo_Po218_prior:
    - 0.02
    - 0.10
  f_halo_Po212_prior:
    - 0.08
    - 0.15
  sigma_halo_Po212_prior:
    - 0.20
    - 0.15
  tau_halo_Po212_prior:
    - 0.05
    - 0.05
  # b2/b3 removed: correlation analysis shows 822%/5479% relative error
  # (nearly unconstrained, strongly anti-correlated with each other)
  # Per-isotope energy resolution
  per_isotope_sigma:
    Po210:
      - 0.107
      - 0.03
    Po218:
      - 0.12
      - 0.03
    Po216:
      - 0.12
      - 0.03
    Po214:
      - 0.13
      - 0.03
    Po212:
      - 0.13
      - 0.05
  # Beta coincidence: high-energy tail from alpha+beta pile-up.
  # Only Po214 has significant beta coincidence (Bi-214 beta endpoint ~3.27 MeV).
  # f_beta = additional fraction of events with simultaneous beta detection.
  # lambda_beta = exponential decay length of the high-energy tail (MeV).
  # Second Gaussian: oblique-incidence population (~29% of events).
  # Alphas arriving at high angles traverse more dead layer → extra
  # energy straggling (broader sigma) and extra energy loss (left offset).
  # The broad component shares EMG charge trapping (same tau) with core.
  # Ref: Li et al. 2020 (Appl Radiat Isot 165, 109342).
  use_gauss2: true
  f_gauss2_prior: [0.29, 0.10]
  sigma_gauss2_ratio_prior: [1.4, 0.5]   # multiplicative: sigma_broad = ratio * sigma_core
  delta_E_broad_prior: [0.02, 0.02]
  # Beta coincidence: high-energy tail from alpha+beta pile-up (Po214 only)
  # Beta coincidence: shared between Po-214 (Bi-214 beta) and Po-212 (Bi-212 beta)
  # Beta coincidence: per-isotope (unshared) to capture different beta spectra.
  # Po-214: Bi-214 beta endpoint 3.27 MeV (higher E, longer lambda)
  # Po-212: Bi-212 beta endpoint 2.25 MeV (lower E, shorter lambda)
  # Unshared because Po-212 needs much stronger right-side tail (sigma_asym
  # was compensating: sigma_right/sigma = 2.0 at Po-212 energy).
  f_beta_Po214_prior: [0.04, 0.04]
  lambda_beta_Po214_prior: [0.13, 0.08]
  # Po-212: Bi-212 beta endpoint 2.25 MeV (shorter lambda than Po-214)
  f_beta_Po212_prior: [0.04, 0.04]
  lambda_beta_Po212_prior: [0.10, 0.08]
  share_beta: false
  # Beta backscatter LET continuum: partial energy from backscattered electrons.
  # Shared (Si backscatter coeff ~15-20%, energy-independent).
  # Uncomment to enable: f_beta_bs_shared_prior: [0.01, 0.02]
  max_tau_ratio: 2.0
  float_sigma_e: false  # per-isotope sigmas float instead
  peak_search_prominence: 30
  peak_search_width_adc: 3
  peak_search_method: prominence
  peak_search_cwt_widths: null
  refit_aic_threshold: 2.0
  use_plot_bins_for_fit: true
  unbinned_likelihood: false
  split_half_validation: false
  # D2: Held-out test for shelf/halo contribution.  Fits full and
  # reduced (core+EMG only) models on even-indexed events, evaluates
  # on odd-indexed events to test whether the extra low-energy
  # flexibility actually improves held-out NLL.
  shelf_halo_test: false
  # C4: Number of pseudoexperiment trials for calibrating diagnostic
  # thresholds through the full DNL pipeline.  0 = disabled (default).
  # ~200 trials needed for stable 5th/95th percentile bands.
  pseudoexperiment_trials: 0
  flags:
    fix_sigma0: true   # redundant when per-isotope sigmas float
    sigma0_prior:
      - 0.13
      - 0.05
    fix_f: true       # fix the Fano factor
    f_prior:
      - 0.0
      - 0.01
    # Tau: floating for all isotopes (shared shape handles shelf/halo)
    fix_tau_Po210: false
    fix_tau_Po218: false
    fix_tau_Po214: false
    fix_tau_Po212: false
    # Shelf fractions: floating (shared across isotopes)
    fix_f_shelf_Po210: false
    fix_f_shelf_Po218: false
    fix_f_shelf_Po214: false
    fix_f_shelf_Po212: false
    # Shelf widths: floating (shared across isotopes)
    fix_sigma_shelf_Po210: false
    fix_sigma_shelf_Po218: false
    fix_sigma_shelf_Po214: false
    fix_sigma_shelf_Po212: false
    # Fix thoron chain sigma (low statistics)
    fix_sigma_Po212: true
    fix_sigma_Po216: true
    # Po216: uses shared_shape_passive — inherits shared shape params
    fix_f_shelf_Po216: false
    fix_f_halo_Po216: false
    fix_sigma_shelf_Po216: false
    fix_sigma_halo_Po216: false
    fix_tau_halo_Po216: false
    fix_tau_halo_shared: true   # tau_halo ≈ 0 ± 0.078 — unconstrained, drop it
    # Fix b0: redundant in loglin_unit model (cancels in normalization)
    fix_b0: true
    # b2/b3: large relative errors (200-300%) but removing them degrades
    # chi2/ndf from 1.09 to 8.55. The background shape requires curvature
    # even though the individual coefficients are weakly constrained.
    # Gaussian penalty priors: soft constraints in the NLL for parameters
    # where the likelihood alone cannot distinguish the component from
    # background.  Physics requires all isotopes to have similar dead-layer
    # scattering (halo) and energy-loss (shelf) profiles.
    penalty_priors:
      S_Po212:
        - 3000
        - 5000
      S_Po216:
        - 1000
        - 2000
  mu_bounds:
    Po210:
      - 5.20
      - 5.35
    Po218:
      - 5.93
      - 6.07
    Po216:
      - 6.65
      - 6.90
    Po214:
      - 7.60
      - 7.71
    Po212:
      - 8.70
      - 8.90
time_fit:
  do_time_fit: true
  window_po214:
    - 7.55
    - 7.80
  window_po218:
    - 5.90
    - 6.10
  window_po210:
    - 5.25
    - 5.37
  window_po212:
    - 8.65
    - 9.05
  eff_po214: null
  eff_po218: null
  eff_po210: null
  hl_po214: null
  hl_po218: null
  bkg_po214:
    - 0.0
    - 0.2
  bkg_po218:
    - 0.0
    - 0.0
  sig_n0_po214: 1.0
  sig_n0_po218: 1.0
  background_guess: 0.0
  n0_guess_fraction: 0.1
  flags:
    fix_background_b: false
    fix_n0_po218: false
  # Per-bin isotope extraction method:
  #   "roi"      – simple ROI window counting (default, fast)
  #   "template" – full spectral template fit with frozen shapes from aggregate
  extraction_method: template
  # Template fitting options (only used when extraction_method: template)
  template_rebin: 20          # energy rebin factor vs aggregate (coarser for statistics)
  template_min_counts: 30     # minimum events per time bin to attempt fit
  float_centroids: true       # allow peak centroids to float (tight prior)
  fix_weak_isotopes: true     # fix Po216/Po210/Bi212/extra peaks in per-bin fits
systematics:
  enable: false
  sigma_e_frac: 0.1
  tail_fraction: 0.05
  energy_shift_kev: 0.001
  adc_drift_rate: 0.0
  adc_drift_mode: linear
  adc_drift_params: null
gas_dissolution:
  # Henry's law constants (dimensionless air/liquid partition coefficients).
  # K_H = C_air / C_liquid, so C_liquid = C_air / K_H.
  radon_henry_constant: 9.12  # uncertainty +/- 0.48 — needs further validation before relying on this value too much
  argon_henry_constant: 1.0        # placeholder
  argon_atmospheric_fraction: 0.00934  # volume fraction of Ar in dry air
radon_inference:
  enabled: true
  source_isotopes:
  - Po214
  - Po218
  source_weights:
    Po214: 0.5
    Po218: 0.5
  detection_efficiency:
    Po214: 0.19
    Po218: 0.094
  transport_efficiency: 1.0
  retention_efficiency: 1.0
  chain_correction: none  # allowed: none, assume_equilibrium, forward_model
  external_rn:
    mode: file  # allowed: constant, file
    fallback_bq_per_m3: 120.0
    file_path: rad_4996_pico40l.xls
    time_columns:
      year: Year
      month: Month
      day: Day
      hour: Hour
      minute: Minute
      year_format: two_digit
    value_column: Radon Bq/m^3
    tz: America/Toronto
    interpolation: ffill
    max_gap_seconds: 21600
  output:
    write_per_interval: true
    write_cumulative: true
plotting:
  plot_spectrum_binsize_adc: 1
  plot_time_binning_mode: fixed
  plot_time_bin_width_s: 14400
  plot_time_normalise_rate: true
  time_bins_fallback: 1
  plot_save_formats:
  - png
  dump_time_series_json: true
  plot_time_style: lines
  plot_time_show_models: false
  plot_marker_size: 0.5
  overlay_isotopes: true
  save_individual_time_series: true
  plot_all_time_fit_series: false


lucas_bridge:
  enabled: false
  assay_files:
    - "C:/Users/keega/Downloads/Radon assay results (current, May 2023)(UI, LN2 Plant Assays).csv"
    - "C:/Users/keega/Downloads/Radon assay results (current, May 2023)(UGboardcalibration).csv"
  selection:
    labels: ["Radon Monitor", "Titan Trap + Pretrap"]
    date_range: null      # [start_iso, end_iso]
    indices: null         # explicit column indices
  recompute_from_raw: true
  comparison_target: "baseline_corrected_combined"
  volume_convention: "monitor"   # "monitor", "sample", "total"
  monitor_volume_l: 605.0         # Radon monitor internal volume (liters)
  ui_volume_l: 4196.0             # UI volume (liters), for provenance only
  match_window_hours: 2.0          # ±2 h half-width around assay match time
  default_match_time: "18:00"     # efficiency fits use post-spike data (6pm)
  use_unclipped_baseline: true
  skid_background:
    label: "Background Assay - Titan Trap"
    date: "2024-08-08"
  # Assays to exclude from the aggregate (still plotted as open markers).
  # 09/12: wrong LC selected, huge uncertainty, useless measurement
  # 11/01: spike injection day — monitor sees spike, assay is pre-spike
  # 11/19: background assay — huge uncertainties
  per_assay_overrides:
    "2024-09-12":
      match_time: "05:30"        # pre-spike: center early, ±5.5h → 00:00-11:00
      match_window_hours: 5.5    # wide window, capped before noon spike
    "2024-11-01":
      match_time: "05:30"        # pre-spike: center early, ±5.5h → 00:00-11:00
      match_window_hours: 5.5    # wide window, capped before noon spike
    "2024-12-05":
      lc_background_cpd: 16.5    # corrected lucas cell background
  spike_periods:
    # Fit anchors inferred from the current Po214+Po218 decay series.
    # Each fit begins 30 minutes after the listed start time.
    - start: "2024-09-12T14:30:00-04:00"
      end: "2024-09-28T00:00:00-04:00"
      fit_delay_minutes: 30
      label: "Spike 1 (Sep 2024)"
      assay_date: "2024-09-16"
    - start: "2024-11-01T19:00:00-04:00"
      end: "2024-11-24T00:00:00-05:00"
      fit_delay_minutes: 30
      label: "Spike 2 (Nov 2024)"
      assay_date: "2024-11-05"
  exclude_from_aggregate:
    - "2024-11-19"
  # Detector emanation baseline: measured between spike periods when
  # monitor runs standalone with no external radon source.  This rate
  # must be subtracted from the measured activity before computing the
  # bridge factor, because it represents radon from the detector's own
  # surfaces rather than from the air sample.
  emanation_baseline:
    start: "2024-10-02"
    end: "2024-10-28"
    # For UI-connected assays the emanation is diluted over the total
    # system volume: emanation_rate_UI = emanation_rate × V_monitor / V_total
    dilute_for_ui: true

fitting:
  use_stable_emg: true
  emg_stable_mode: true
  emg_tau_min: 5.0e-4
  per_isotope:
    Po210:
      peak_sigma: 0.108



